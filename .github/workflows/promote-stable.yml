name: Promote to ioBroker Stable

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to promote (e.g. 0.2.0)"
        required: true
        type: string
      soak_days:
        description: "Days on npm latest (must be >= 21)"
        required: true
        type: number
      repochecker_passed:
        description: "npx @iobroker/repochecker passed with zero errors"
        required: true
        type: boolean
      open_bug_count:
        description: "Open bug issues against this version"
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-promote:
    runs-on: ubuntu-latest
    steps:
      - name: Validate promotion gates
        env:
          SOAK_DAYS: ${{ inputs.soak_days }}
          REPOCHECKER_PASSED: ${{ inputs.repochecker_passed }}
          OPEN_BUG_COUNT: ${{ inputs.open_bug_count }}
        run: |
          FAIL=0
          if [ "${SOAK_DAYS}" -lt 21 ]; then
            echo "::error::Soak period insufficient: ${SOAK_DAYS} days (need >= 21)"
            FAIL=1
          fi
          if [ "${REPOCHECKER_PASSED}" != "true" ]; then
            echo "::error::repochecker must pass before stable promotion"
            FAIL=1
          fi
          if [ "${OPEN_BUG_COUNT}" -gt 2 ]; then
            echo "::error::Too many open bug issues: ${OPEN_BUG_COUNT} (need <= 2)"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "All gates passed."

      - name: Open stable-repo PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          SOAK_DAYS: ${{ inputs.soak_days }}
          OPEN_BUG_COUNT: ${{ inputs.open_bug_count }}
        run: |
          gh repo fork ioBroker/ioBroker.repositories --clone
          cd ioBroker.repositories
          git checkout -b "promote-ap-systems-ez1-${VERSION}"
          node -e "
            const fs = require('fs');
            const f = 'sources-dist-stable.json';
            const d = JSON.parse(fs.readFileSync(f));
            if (!d['ap-systems-ez1']) { console.error('entry not found'); process.exit(1); }
            d['ap-systems-ez1'].version = process.env.VERSION;
            fs.writeFileSync(f, JSON.stringify(d, null, 2) + '\n');
          "
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add sources-dist-stable.json
          git commit -m "chore: bump ap-systems-ez1 to ${VERSION}"
          git push origin HEAD
          gh pr create \
            --repo ioBroker/ioBroker.repositories \
            --title "chore: ap-systems-ez1 -> ${VERSION} stable" \
            --body "## ap-systems-ez1 stable promotion

          **Version:** \`${VERSION}\`
          **npm:** https://www.npmjs.com/package/iobroker.ap-systems-ez1/v/${VERSION}

          ## Gate checklist
          - [x] Soak: ${SOAK_DAYS} days on npm latest (>= 21)
          - [x] repochecker: passed
          - [x] Open bugs: ${OPEN_BUG_COUNT} (<= 2)

          Generated by promote-stable workflow."
