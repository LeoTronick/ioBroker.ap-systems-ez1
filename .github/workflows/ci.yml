name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/**"
      - "release-please-config.json"
      - ".release-please-manifest.json"
      - "admin/i18n/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/**"
      - "release-please-config.json"
      - ".release-please-manifest.json"
      - "admin/i18n/**"

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: ioBroker/testing-action-check@v1
        with:
          node-version: "20.x"
          type-checking: true
          lint: true

